---
# Clean-room CI builds of the waydroid-nvidia components that are fully
# scripted today (see packaging/aur/PREREQS.md): the guest Venus driver
# (mesa), the host renderer (virglrenderer) and the gralloc backend.
# Each job reproduces the stranger's path: fetch upstream at the pinned
# BASE commit, apply patches/, build via the same build/<comp>/build.sh
# the dev loop uses (one recipe, see packaging/aur/README.md).
#
# On v* tags the release job packages the artifacts with SHA256SUMS and a
# SLSA build-provenance attestation, so users can verify that a downloaded
# binary was built by THIS workflow from THIS repo:
#   gh attestation verify <file> --repo <owner>/waydroid-nvidia
#
# Not built here yet (hand-provisioned prereqs; see PREREQS.md):
# hwcomposer, ANGLE, lineage-20 surfaceflinger — shipped as separately
# uploaded prebuilts until their provisioning is scripted.
name: build

on:
  push:
    branches: [main, ci-aur]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mesa:
    name: guest venus driver (mesa)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load pins
        run: cat packaging/ci/pins.env | grep -v '^#' >> "$GITHUB_ENV"
      - name: Cache NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ~/android-ndk
          key: ndk-${{ env.NDK_VERSION }}
      - name: Install NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSfLo ndk.zip "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          sha256sum ndk.zip
          if [ -n "$NDK_ZIP_SHA256" ]; then echo "$NDK_ZIP_SHA256  ndk.zip" | sha256sum -c; fi
          unzip -q ndk.zip -d "$HOME"
          mv "$HOME/android-ndk-${NDK_VERSION}" "$HOME/android-ndk"
      - name: Host deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq ninja-build python3-mako python3-yaml python3-pip bison flex pkg-config zstd
          pipx install meson  # mesa needs meson >= 1.4.0; ubuntu-24.04 apt has 1.3.2
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Fetch mesa at pinned base
        run: |
          git init -q mesa-src
          git -C mesa-src fetch -q --depth 1 "$MESA_UPSTREAM" "$MESA_SHA"
          git -C mesa-src checkout -q FETCH_HEAD
          git -C mesa-src config user.email ci@waydroid-nvidia
          git -C mesa-src config user.name ci
          git -C mesa-src am "$GITHUB_WORKSPACE"/patches/mesa/0001-*.patch "$GITHUB_WORKSPACE"/patches/mesa/0002-*.patch
          git -C mesa-src apply "$GITHUB_WORKSPACE"/patches/mesa/0003-*.patch
      - name: Build libvulkan_virtio.so
        run: |
          mkdir -p "$RUNNER_TEMP/empty-pkgconfig"
          NDK="$HOME/android-ndk" NDK_PKGCONFIG="$RUNNER_TEMP/empty-pkgconfig" \
            ./build/mesa/build.sh "$PWD/mesa-src" "$PWD/mesa-build"
      - name: Stage artifact
        run: |
          mkdir -p stage
          cp -L mesa-build/src/virtio/vulkan/libvulkan_virtio.so stage/
      - uses: actions/upload-artifact@v4
        with:
          name: guest-vulkan-virtio
          path: stage/*
          if-no-files-found: error

  virglrenderer:
    name: host venus renderer (virglrenderer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load pins
        run: cat packaging/ci/pins.env | grep -v '^#' >> "$GITHUB_ENV"
      - name: Host deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq meson ninja-build pkg-config python3-yaml zstd \
            libepoxy-dev libdrm-dev libgbm-dev libegl-dev libgles-dev libvulkan-dev libx11-dev libwayland-dev
      - name: Fetch virglrenderer at pinned base
        run: |
          git init -q virgl-src
          git -C virgl-src fetch -q --depth 1 "$VIRGL_UPSTREAM" "$VIRGL_SHA"
          git -C virgl-src checkout -q FETCH_HEAD
          git -C virgl-src config user.email ci@waydroid-nvidia
          git -C virgl-src config user.name ci
          git -C virgl-src am "$GITHUB_WORKSPACE"/patches/virglrenderer/0001-*.patch \
            "$GITHUB_WORKSPACE"/patches/virglrenderer/0002-*.patch \
            "$GITHUB_WORKSPACE"/patches/virglrenderer/0003-*.patch
          git -C virgl-src apply "$GITHUB_WORKSPACE"/patches/virglrenderer/0004-*.patch
      - name: Build virgl_test_server + render server
        run: REPO="$GITHUB_WORKSPACE" ./build/virglrenderer/build.sh "$PWD/virgl-src" "$PWD/virgl-build"
      - name: Stage artifacts
        run: |
          mkdir -p stage
          cp -L virgl-build/vtest/virgl_test_server stage/
          cp -L virgl-build/server/virgl_render_server stage/
          cp -L virgl-build/src/libvirglrenderer.so.1 stage/
      - uses: actions/upload-artifact@v4
        with:
          name: host-venus-server
          path: stage/*
          if-no-files-found: error

  gralloc:
    name: guest gralloc backend (minigbm vtest wrapper)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load pins
        run: cat packaging/ci/pins.env | grep -v '^#' >> "$GITHUB_ENV"
      - name: Cache NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ~/android-ndk
          key: ndk-${{ env.NDK_VERSION }}
      - name: Install NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSfLo ndk.zip "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          sha256sum ndk.zip
          if [ -n "$NDK_ZIP_SHA256" ]; then echo "$NDK_ZIP_SHA256  ndk.zip" | sha256sum -c; fi
          unzip -q ndk.zip -d "$HOME"
          mv "$HOME/android-ndk-${NDK_VERSION}" "$HOME/android-ndk"
      - name: Fetch minigbm at pinned base
        run: |
          git init -q minigbm
          git -C minigbm fetch -q --depth 1 "$MINIGBM_UPSTREAM" "$MINIGBM_SHA"
          git -C minigbm checkout -q FETCH_HEAD
      - name: Build libgbm_mesa_wrapper.so
        run: |
          NDK="$HOME/android-ndk" MINIGBM="$PWD/minigbm" \
            ./build/gralloc/build.sh "$PWD/gralloc-out"
      - uses: actions/upload-artifact@v4
        with:
          name: guest-gralloc
          path: gralloc-out/libgbm_mesa_wrapper.so
          if-no-files-found: error

  waydroid-patch-check:
    name: waydroid patch applies at pinned base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load pins
        run: cat packaging/ci/pins.env | grep -v '^#' >> "$GITHUB_ENV"
      - name: Fetch waydroid and apply-check
        run: |
          git init -q waydroid
          git -C waydroid fetch -q --depth 1 "$WAYDROID_UPSTREAM" "$WAYDROID_SHA"
          git -C waydroid checkout -q FETCH_HEAD
          git -C waydroid apply --check "$GITHUB_WORKSPACE"/patches/waydroid/0001-*.patch
          echo "waydroid patch applies cleanly at $WAYDROID_SHA"

  release:
    name: release (tarballs + SHA256SUMS + provenance)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [mesa, virglrenderer, gralloc, waydroid-patch-check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble tarballs
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p out
          # host side: venus vtest server + render server + private lib
          mkdir -p host && cp artifacts/host-venus-server/* host/
          tar --zstd -C host -cf "out/waydroid-nvidia-host-x86_64-${TAG}.tar.zst" .
          # guest side (android-x86_64): venus driver + gralloc backend
          mkdir -p guest && cp artifacts/guest-vulkan-virtio/* artifacts/guest-gralloc/* guest/
          tar --zstd -C guest -cf "out/waydroid-nvidia-guest-android-x86_64-${TAG}.tar.zst" .
          (cd out && sha256sum ./*.tar.zst > SHA256SUMS)
          cat out/SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: out/*.tar.zst
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease \
            --title "waydroid-nvidia $TAG" \
            --notes "CI-built from patches/ at the pinned bases (packaging/ci/pins.env).
          Verify any asset's provenance with:
          \`gh attestation verify <file> --repo $GITHUB_REPOSITORY\`

          The guest prebuilts tarball (hwcomposer, ANGLE, surfaceflinger) is uploaded
          separately until its build provisioning is scripted in CI — recipes live in
          build/hwcomposer, build/angle, build/lineage-20; see packaging/aur/PREREQS.md." \
            out/*.tar.zst out/SHA256SUMS
